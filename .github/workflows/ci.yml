name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  local-gate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-insta
      - uses: Swatinem/rust-cache@v2
      - run: just check
      - run: just build
      - run: just test
      - run: just insta-test

  semver-checks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect public crate source changes
        id: public-crate-changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Eq '^(crates/rtm-core|crates/rtm-client)/(src/|Cargo.toml)|^Cargo.toml$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.public-crate-changes.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.public-crate-changes.outputs.changed == 'true'
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: lilo-rm-core, lilo-rm-client
